name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    env:
      SCHEME: PS5PayloadSender
      PROJECT: PS5PayloadSender.xcodeproj
      ARCHIVE_PATH: build/PS5PayloadSender.xcarchive
      EXPORT_PATH: build/ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show SDK info
        run: xcodebuild -showsdks

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -xcconfig ci.xcconfig \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            | xcpretty || true

      - name: Package IPA (unsigned)
        run: |
          mkdir -p "$EXPORT_PATH"
          APP=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r "$EXPORT_PATH/PS5PayloadSender.ipa" Payload/
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PS5PayloadSender-IPA
          path: ${{ env.EXPORT_PATH }}/PS5PayloadSender.ipa
          retention-days: 7
